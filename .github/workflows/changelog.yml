name: Changelog
on:
  workflow_dispatch:
    inputs:
      ECC_BRANCH:
        description: 'A branch to use when cloning https://github.com/epam/syndicate-rule-engine'
        default: 'develop'
        required: false
        type: string
      ECC_ACTIONS_BRANCH:
        description: 'A branch to use when cloning git.epam.com/epmc-sec/cloudlab/cloud_custodian/ecc-actions'
        default: 'main'
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*.*"
  pull_request_review:
    types: 
      - submitted
  schedule:
    - cron: "0 7 * * 1"

env:
  ECC_BRANCH: develop
  ECC_ACTIONS_BRANCH: main


jobs:
  github_release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout ecc-actions
        run: git clone -b ${{ inputs.ECC_ACTIONS_BRANCH || env.ECC_ACTIONS_BRANCH }}  "https://git:$PROJECT_TOKEN@git.epam.com/epmc-sec/cloudlab/cloud_custodian/ecc-actions.git" ecc-actions
        env:
          PROJECT_TOKEN: ${{ secrets.ECC_CHANGELOG_ACTION }}

      - name: Create wiki
        uses: ./ecc-actions/generate-list-of-rules

      - name: Release action
        uses: ./ecc-actions/release-rulepack-action
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
